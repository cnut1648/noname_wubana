name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    name: Draft Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: release-metadata
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"

          if [[ ! "$TAG" =~ ^v[0-9]+([.][0-9]+)*$ ]]; then
            echo "Tag $TAG is not a numeric release tag." >&2
            exit 1
          fi

          git fetch --force --tags origin

          LATEST_TAG="$(git tag -l 'v*' | grep -E '^v[0-9]+([.][0-9]+)*$' | sort -V | tail -n 1)"
          if [[ "$TAG" == "$LATEST_TAG" ]]; then
            IS_LATEST_RELEASE=true
          else
            IS_LATEST_RELEASE=false
          fi
          echo "is_latest_release=$IS_LATEST_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          IS_LATEST_RELEASE: ${{ steps['release-metadata'].outputs.is_latest_release }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ARGS=(
            --title "$TAG"
            --notes-file RELEASE_NOTES.md
            --draft
          )

          if [[ "$IS_LATEST_RELEASE" == "true" ]]; then
            RELEASE_ARGS+=(--latest)
          else
            RELEASE_ARGS+=(--latest=false)
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — resetting to draft to rebuild/overwrite assets"
            gh release edit "$TAG" --draft --title "$TAG" --notes-file RELEASE_NOTES.md
          else
            gh release create "$TAG" "${RELEASE_ARGS[@]}"
          fi

  build-packages:
    name: Build Packages
    needs: create-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core and full packages
        shell: bash
        run: |
          mkdir -p release
          pnpm build

          cd apps/core/dist
          7z a ../../../release/noname.core.zip *

          cd ../../../dist
          7z a ../release/noname.full.zip *

      - name: Upload packages to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release upload "$TAG" \
          release/noname.core.zip \
          release/noname.full.zip \
          --clobber

  build-installer:
    name: Build Installer
    needs: create-release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare version
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"
          echo "VER=$VER" >> "$GITHUB_ENV"

      - name: Build Windows installer
        shell: bash
        run: |
          mkdir -p release
          pnpm build

          pnpm -F @noname/electron build:win
          EXE="$(find output -maxdepth 1 -name '*.exe' | head -n 1)"
          cp "$EXE" "release/noname.Setup.${VER}.exe"

      - name: Upload installer to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release upload "$TAG" \
          "release/noname.Setup.${VER}.exe" \
          --clobber

  build-android:
    name: Build Android (test APK)
    needs: create-release
    runs-on: ubuntu-latest
    # 非官方测试用 APK：debug 签名、自带全部素材（体积较大），仅供和朋友试玩。
    # 该任务为“尽力而为”：即使失败也不会阻塞 Windows 发布或删除草稿。
    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android/sdk/ndk /opt/ghc /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: false

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare version
        shell: bash
        run: echo "VER=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build web bundle (dist)
        run: pnpm build

      - name: Capacitor sync (copy dist into android)
        working-directory: apps/mobile
        run: |
          pnpm exec cap sync android
          pnpm exec tsx afterSync.ts

      - name: Build debug APK
        working-directory: apps/mobile/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release
          APK="$(find apps/mobile/android -path '*/outputs/apk/debug/*.apk' | head -n 1)"
          if [[ -z "$APK" ]]; then echo "APK not found" >&2; exit 1; fi
          cp "$APK" "release/noname-wuban-test-${VER}.apk"
          gh release upload "${GITHUB_REF_NAME}" "release/noname-wuban-test-${VER}.apk" --clobber

  release:
    name: Release Version
    runs-on: ubuntu-latest
    needs:
      - build-packages
      - build-installer
    permissions:
      contents: write
      discussions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"

          gh release edit "$TAG" --draft=false

  cleanup-release:
    name: Clean Draft When Failure
    if: ${{ failure() }}
    needs:
      - create-release
      - build-packages
      - build-installer
      - release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Delete draft release on failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete "$GITHUB_REF_NAME" --yes --cleanup-tag=false
