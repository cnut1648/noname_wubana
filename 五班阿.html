<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>五班阿 · 武将技能一览</title>
<style>
  :root{
    --gold:#e8c86a; --gold-2:#c9a44c; --ink:#15100b; --ink-2:#1e1710; --card:#241b12; --card-2:#2c2016;
    --line:#4a3a24; --text:#efe6d6; --muted:#b6a488; --lock:#7aa9ff; --limit:#ff9a6b; --awaken:#c79bff; --lord:#ffd76b;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, #2a2013 0%, rgba(42,32,19,0) 60%),
      linear-gradient(180deg, var(--ink) 0%, var(--ink-2) 100%);
    color:var(--text);
    font-family:"PingFang SC","Microsoft YaHei","微软雅黑","Hiragino Sans GB",system-ui,sans-serif;
    min-height:100vh;
  }
  .wrap{max-width:1280px;margin:0 auto;padding:28px 20px 80px}
  header.hero{text-align:center;padding:26px 10px 12px;position:relative}
  .title{
    font-family:"STKaiti","KaiTi","楷体",serif;
    font-size:clamp(44px,8vw,84px); line-height:1; margin:0; letter-spacing:.08em;
    background:linear-gradient(180deg,#fff4d6,var(--gold) 45%,var(--gold-2));
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 2px 30px rgba(232,200,106,.25);
  }
  .subtitle{color:var(--muted);margin:12px 0 2px;font-size:15px;letter-spacing:.12em}
  .stats{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:16px}
  .stat{background:rgba(232,200,106,.08);border:1px solid var(--line);border-radius:999px;padding:6px 16px;font-size:13px;color:var(--gold)}
  .stat b{color:#fff;font-size:16px;margin-right:4px}

  .controls{position:sticky;top:0;z-index:20;padding:14px 0 12px;margin-top:14px;
    background:linear-gradient(180deg, var(--ink-2) 70%, rgba(30,23,16,0));backdrop-filter:blur(4px)}
  .searchbar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:10px 14px;max-width:520px;margin:0 auto 12px;box-shadow:0 6px 20px rgba(0,0,0,.3)}
  .searchbar input{flex:1;background:transparent;border:0;outline:0;color:var(--text);font-size:15px}
  .searchbar input::placeholder{color:var(--muted)}
  .searchbar .ic{opacity:.7}
  .pills{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
  .pill{cursor:pointer;user-select:none;border:1px solid var(--line);background:var(--card);color:var(--muted);
    padding:7px 16px;border-radius:999px;font-size:14px;transition:.18s}
  .pill:hover{color:var(--text);border-color:var(--gold-2)}
  .pill.active{background:linear-gradient(180deg,var(--gold),var(--gold-2));color:#2a1d09;border-color:var(--gold);font-weight:700}
  .count{text-align:center;color:var(--muted);font-size:13px;margin:14px 0 4px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px}
  .card{position:relative;background:linear-gradient(180deg,var(--card-2),var(--card));border:1px solid var(--line);
    border-radius:16px;padding:0 0 14px;overflow:hidden;cursor:pointer;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s;box-shadow:0 8px 22px rgba(0,0,0,.35)}
  .card:hover{transform:translateY(-4px);border-color:var(--gold-2);box-shadow:0 16px 34px rgba(0,0,0,.5),0 0 0 1px rgba(232,200,106,.25)}
  .chead{display:flex;align-items:center;gap:14px;padding:16px 16px 12px;
    background:linear-gradient(180deg, rgba(232,200,106,.10), rgba(232,200,106,0))}
  .mono{width:56px;height:56px;flex:0 0 auto;border-radius:12px;display:grid;place-items:center;
    font-family:"STKaiti","KaiTi",serif;font-size:26px;font-weight:700;color:#1a1206;
    box-shadow:inset 0 0 0 2px rgba(255,255,255,.18), 0 4px 12px rgba(0,0,0,.35)}
  .cmeta{flex:1;min-width:0}
  .cname{font-family:"STKaiti","KaiTi","楷体",serif;font-size:24px;margin:0;line-height:1.1;color:#fff}
  .ctags{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px;align-items:center}
  .tag{font-size:11px;padding:2px 9px;border-radius:6px;border:1px solid var(--line);color:var(--muted)}
  .tag.cat{background:rgba(232,200,106,.12);color:var(--gold);border-color:transparent}
  .tag.grp{color:#fff;border:0;font-weight:700}
  .hp{display:flex;gap:2px;align-items:center;margin-left:auto}
  .hp .h{color:#e0554b;font-size:15px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))}
  .hp .n{color:var(--muted);font-size:12px;margin-left:4px}
  .skills{padding:4px 16px 0;display:flex;flex-direction:column;gap:10px}
  .skill{background:rgba(0,0,0,.18);border-left:3px solid var(--gold-2);border-radius:8px;padding:9px 12px}
  .skill.lock{border-left-color:var(--lock)}
  .skill.limit{border-left-color:var(--limit)}
  .skill.awaken{border-left-color:var(--awaken)}
  .skill.duty{border-left-color:#a06bd0} .skill.coop{border-left-color:#3aa8a0} .skill.faction{border-left-color:#d08a3a}
  .skill.lord{border-left-color:var(--lord)}
  .sname{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--gold);font-size:16px}
  .stype{font-size:10px;padding:1px 7px;border-radius:5px;color:#1a1206;font-weight:700}
  .stype.lock{background:var(--lock)} .stype.limit{background:var(--limit)}
  .stype.awaken{background:var(--awaken)} .stype.lord{background:var(--lord)}
  .stype.duty{background:#a06bd0} .stype.coop{background:#3aa8a0} .stype.faction{background:#d08a3a}
  .sinfo{color:var(--muted);font-size:13.5px;line-height:1.7;margin-top:5px}
  .sinfo b,.sinfo .kw{color:var(--gold)}
  mark{background:rgba(232,200,106,.35);color:#fff;border-radius:3px;padding:0 2px}

  .modal{position:fixed;inset:0;z-index:50;display:none;align-items:center;justify-content:center;
    background:rgba(6,4,2,.72);backdrop-filter:blur(6px);padding:20px}
  .modal.open{display:flex;animation:fade .2s ease}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .modal .box{max-width:640px;width:100%;max-height:88vh;overflow:auto;background:linear-gradient(180deg,var(--card-2),var(--card));
    border:1px solid var(--gold-2);border-radius:18px;box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .modal .close{position:sticky;top:0;float:right;margin:10px;cursor:pointer;color:var(--muted);font-size:22px;
    background:rgba(0,0,0,.3);border-radius:8px;width:34px;height:34px;display:grid;place-items:center;border:1px solid var(--line)}
  .empty{text-align:center;color:var(--muted);padding:60px 0;font-size:16px}
  footer{text-align:center;color:var(--muted);font-size:12px;margin-top:40px;line-height:1.9}
  footer a{color:var(--gold-2)}
</style>
</head>
<body>
<div class="wrap">
  <header class="hero">
    <h1 class="title">五班阿</h1>
    <div class="subtitle">无 名 杀 · 五 班 同 学 主 题 扩 展</div>

      <span class="stat"><b>91</b>个技能</span>
      <span class="stat"><b>6</b>个系列</span>
    </div>
  </header>

  <div class="controls">
    <div class="searchbar">
      <span class="ic">🔍</span>
      <input id="q" type="search" placeholder="搜索武将名 / 技能名 / 技能描述…" autocomplete="off" />
    </div>
    <div class="pills" id="pills"></div>
  </div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid"></div>

  <footer>
    五班阿扩展 · 51 名武将 / 133 个技能 · 技能均为同学梗自制<br/>

  </footer>
</div>

<script>
const DATA = [{"key":"wba_sp_hezhizhao","name":"sp何智昭","cat":"sp","group":"qun","sex":"male","hp":3,"skills":[{"name":"农夫与蛇","info":"结束阶段，你可以指定一名其他角色为“蛇”。到你的下回合开始前，该角色每使用一张牌指定你为目标时，你可以摸一张牌。","type":null},{"name":"吕洞宾与狗","info":"准备阶段，你可以指定一名其他角色为“狗”，本回合内其每打出一张牌响应你指定其为目标的牌，你摸一张牌。","type":null},{"name":"我与够汪磊","info":"锁定技，当你死亡时，杀死你的角色成为“够汪磊”并失去所有非锁定技能直到游戏结束。","type":{"label":"锁定技","cls":"lock"}}]},{"key":"wba_sp_xujiashu","name":"sp徐家澍","cat":"sp","group":"qun","sex":"male","hp":3,"skills":[{"name":"博览","info":"摸牌阶段，你改为展示牌堆顶的四张牌，并获得其中任意张点数之和小于等于13的牌。","type":null},{"name":"自焚","info":"限定技，出牌阶段，你可以失去一点体力，令所有其他角色依次（按座次）选择一项：1.弃置至少X张牌（若上一名进行选择的角色以此法弃置过牌，则X为其以此法弃置的牌数+1，否则X为1）；2.受到你造成的2点火焰伤害。","type":{"label":"限定技","cls":"limit"}}]},{"key":"wba_sp_songyijian","name":"sp宋轶健","cat":"sp","group":"qun","sex":"male","hp":3,"skills":[{"name":"推理","info":"出牌阶段限一次，你可以与一名其他角色拼点。若你赢，则该角色本回合所有非锁定技失效，你计算至其的距离视为1，且本回合内若你对其使用的【杀】被【闪】抵消，你可以弃置其一张手牌。","type":null},{"name":"明断","info":"你可以将一张黑色牌当作【无懈可击】使用。","type":null}]},{"key":"wba_sp_huangyanrui","name":"sp黄彦瑞","cat":"sp","group":"qun","sex":"male","hp":3,"skills":[{"name":"存粮","info":"摸牌阶段，若你的武将牌上没有“粮”，你可以额外摸两张牌，并可以将任意数量的手牌置于武将牌上，称为“粮”；其他角色的【兵粮寸断】不能指定你为目标（“蔡晶君”除外）。","type":null},{"name":"布施","info":"一名角色的结束阶段，若该角色的手牌数小于其体力值且你有“粮”，你可以移去一张“粮”，令该角色摸两张牌。","type":null},{"name":"失踪","info":"觉醒技，准备阶段，若你的体力值为1且武将牌上没有“粮”，你减1点体力上限，失去“存粮”和“布施”，然后获得两个新技能。","type":{"label":"觉醒技","cls":"awaken"}}]},{"key":"wba_sp_chenyi","name":"sp陈翼","cat":"sp","group":"qun","sex":"male","hp":4,"skills":[{"name":"校草","info":"锁定技，摸牌阶段你额外摸一张牌，且你的手牌上限恒定为你的体力上限。","type":{"label":"锁定技","cls":"lock"}},{"name":"吸毒","info":"准备阶段，你可以弃置两张颜色不同的牌并选择一项：1.本回合出牌阶段你可以多使用两张【杀】；2.将场上一名角色装备区的一张牌移动给另一名角色；3.获得其他一名角色的一张手牌。","type":null}]},{"key":"wba_sp_xushengjie","name":"sp许盛杰","cat":"sp","group":"qun","sex":"male","hp":4,"skills":[{"name":"入眠","info":"当你即将受到伤害时，你可以摸一张牌并将武将牌翻面，防止此次伤害。","type":null},{"name":"清醒","info":"当你将武将牌从背面翻回正面时，你可以选择一项：1.回复一点体力；2.摸两张牌。","type":null}]},{"key":"wba_shen_libowei","name":"神李博为","cat":"shen","group":"shen","sex":"male","hp":5,"skills":[{"name":"创作","info":"游戏开始时，你随机获得两张武将牌，然后亮出其中一张。你获得亮出的“化身”牌的一个技能，且性别和势力视为与“化身”牌相同。回合开始时或结束后，你可以更改亮出的“化身”牌，并重新声明一个技能。（不能声明限定技、觉醒技或主公技）","type":{"label":"限定技","cls":"limit"}},{"name":"怀旧","info":"锁定技，当你失去一点体力或受到伤害后，你获得一张新的“化身”牌。你的手牌上限恒定为X+1（X为你拥有的“化身”牌的数量）。","type":{"label":"锁定技","cls":"lock"}},{"name":"开始吧","info":"锁定技，结束阶段，你摸一张牌。","type":{"label":"锁定技","cls":"lock"}}]},{"key":"wba_shen_xujiashu","name":"神徐家澍","cat":"shen","group":"shen","sex":"male","hp":5,"skills":[{"name":"转学","info":"出牌阶段限一次，你可以弃置任意张牌，然后摸等量的牌。若你以此法弃置的牌中包括你的所有手牌，你多摸一张牌。","type":null},{"name":"夏校","info":"结束阶段，若本回合你打出或使用的手牌花色数量大于你的体力值，则你可以选择一项：1.摸四张牌并将武将牌翻面；2.弃置一张红色花色的手牌并回复一点体力。","type":null}]},{"key":"wba_shen_huangyanrui","name":"神黄彦瑞","cat":"shen","group":"shen","sex":"male","hp":5,"skills":[{"name":"借箭","info":"每当你被“单独”指定为一张牌的目标时，你可以进行一次判定：若结果为红色，你将判定牌置于武将牌上，称为“箭”；若为梅花，你摸一张牌；若为黑桃，你可以使这张以你为目标的牌对你无效。","type":null},{"name":"放箭","info":"出牌阶段，你可以将任意数量的“箭”当作【万箭齐发】使用。","type":null},{"name":"跤友","info":"锁定技，当你的武将牌上没有“箭”时，男性角色对你、你对男性角色造成的伤害均加一。","type":{"label":"锁定技","cls":"lock"}}]},{"key":"wba_shen_songyijian","name":"神宋轶健","cat":"shen","group":"shen","sex":"male","hp":5,"skills":[{"name":"摸鱼","info":"若你的手牌数为全场最多，你可以跳过摸牌阶段；若你的体力值为全场最多，你可以跳过出牌阶段；若你的装备区里有牌且数量为全场最多，你可以跳过弃牌阶段。","type":null},{"name":"加班","info":"结束阶段，你可以选择一项：1.摸X+1张牌（X为本回合你跳过的阶段数量）；2.从至多X名角色手牌中各抽取一张牌。之后你进行一个额外的出牌阶段。","type":null},{"name":"摆烂","info":"结束阶段，若本回合你没有跳过任一阶段，你可以选择一名角色，视为对其使用一张无距离限制的杀。","type":null}]},{"key":"wba_shen_dushiyu","name":"神杜时宇","cat":"shen","group":"shen","sex":"male","hp":5,"skills":[{"name":"奇才","info":"你可以将任意黑色牌当作【无懈可击】使用，将任意红色牌当作【无中生有】使用，每轮均限一次。","type":null},{"name":"诺奖","info":"其他角色的结束阶段，若你本回合未成为过其使用牌的目标，你摸一张牌；否则你可以弃置X张牌对其造成一点伤害（X为你本回合成为其使用牌的目标次数）。","type":null}]},{"key":"wba_libowei_band","name":"李博为·管乐队","cat":"band","group":"wei","sex":"male","hp":4,"skills":[{"name":"参演","info":"锁定技，其他角色到你的距离+1。","type":{"label":"锁定技","cls" 限定技","cls":"limit"}},{"name":"会赢的","info":"协力技，回合开始阶段，你可以指定一名其他角色。你的本回合与其下一回合内：1.共造成至少4点伤害则你摸三张牌；2.出牌点数均单调递增则各回一点体力；3.共获得超过六张牌则你下一回合用“杀”无次数限制。","type":{"label":"协力技","cls":"coop"}}]},{"key":"wba_you_dushiyu","name":"游杜时宇","cat":"faction3","group":"you","sex":"male","hp":4,"skills":[{"name":"延迟","info":"锁定技，出牌阶段，你使用的手牌不选择目标且不结算，改为依序背面朝上盖置于武将牌上（盖置【杀】不计入次数）。你的结束阶段开始时，将“延迟”牌依序翻开、为其选择合法目标依次结算，无法指定目标则置入弃牌堆。","type":{"label":"锁定技","cls":"lock"}},{"name":"巧匠","info":"回合结束阶段，每当一张“延迟”牌被翻开并成功结算后，你可以令一名其他角色从牌堆获得一张相同类型的牌。若为装备牌，其可选择直接置入装备区。","type":null},{"name":"赢你妈","info":"协力技，回合开始阶段，你可以指定一名其他角色。你的本回合与其下一回合内共造成0点伤害，或共弃掉四种花色的手牌，则你摸四张牌并背面朝上扣置于你或该角色武将牌上；拥有者下个摸牌阶段开始时获得之。","type":{"label":"协力技","cls":"coop"}}]},{"key":"wba_you_xujiashu","name":"游徐家澍","cat":"faction3","group":"you","sex":"male","hp":4,"skills":[{"name":"创新","info":"协力技，结束阶段，你声明一种本回合场上未被使用或打出的非装备牌名，并选至多两名其他角色。若至少一名拥有同名手牌则成功：你从牌堆获得该牌名一张；否则失败：你选择的其他角色失去非锁定技直到其下个回合开始。","type":{"label":"协力技","cls":"coop"}},{"name":"黑人拍皮球","info":"锁定技，黑色锦囊牌对你无效，你的黑色伤害类锦囊造成的伤害+1。","type":{"label":"锁定技","cls":"lock"}},{"name":"篱下","info":"锁定技，出牌阶段，你至多使用X张牌（X为你的体力值）。你使用锦囊牌后，结束出牌阶段。","type":{"label":"锁定技","cls":"lock"}}]}];
const CATS = [{"id":"sp","label":"SP"},{"id":"shen","label":"神话"},{"id":"band","label":"管乐队"},{"id":"soccer","label":"足球队"},{"id":"jx","label":"界限突破"},{"id":"faction3","label":"研工游"},{"id":"origin","label":"原版"}];
const GROUPS = {"wei":{"name":"魏","color":"#5b8fd6"},"shu":{"name":"蜀","color":"#d15b52"},"wu":{"name":"吴","color":"#43b07a"},"qun":{"name":"群","color":"#c9a44c"},"shen":{"name":"神","color":"#e8c86a"},"jin":{"name":"晋","color":"#b8bcc2"},"yan":{"name":"研","color":"#4a8fd0"},"gong":{"name":"工","color":"#c8a24a"},"you":{"name":"游","color":"#4ec07a"}};
let curCat = "all", curQ = "";

const esc = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
function hl(s){ // 高亮牌名【】与搜索词
  let t = esc(s).replace(/【([^】]+)】/g,'【<span class="kw">$1</span>】');
  if(curQ){ const re=new RegExp('('+curQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'); t=t.replace(re,'<mark>$1</mark>'); }
  return t;
}
function grpTag(g){ const G=GROUPS[g]||{name:g,color:"#999"}; return '<span class="tag grp" style="background:'+G.color+'">'+G.name+'</span>'; }
function monoStyle(g){ const G=GROUPS[g]||{color:"#c9a44c"}; return 'background:linear-gradient(160deg,'+G.color+',#e8c86a)'; }
function hearts(hp){ let h=''; for(let i=0;i<hp;i++) h+='<span class="h">❤</span>'; return '<span class="hp">'+h+'<span class="n">'+hp+'</span></span>'; }
function sexIcon(s){ return s==="female"?'♀':'♂'; }
function catLabel(id){ const c=CATS.find(x=>x.id===id); return c?c.label:id; }

function skillHTML(sk){
  const t=sk.type?('<span class="stype '+sk.type.cls+'">'+sk.type.label+'</span>'):'';
  return '<div class="skill '+(sk.type?sk.type.cls:'')+'"><div class="sname">'+esc(sk.name)+t+'</div><div class="sinfo">'+hl(sk.info)+'</div></div>';
}
function cardHTML(d){
  return '<div class="card" data-key="'+d.key+'">'
    +'<div class="chead"><div class="mono" style="'+monoStyle(d.group)+'">'+esc(d.name[0]||'')+'</div>'
    +'<div class="cmeta"><h3 class="cname">'+esc(d.name)+'</h3>'
    +'<div class="ctags"><span class="tag cat">'+catLabel(d.cat)+'</span>'+grpTag(d.group)
    +'<span class="tag">'+sexIcon(d.sex)+'</span>'+hearts(d.hp)+'</div></div></div>'
    +'<div class="skills">'+d.skills.map(skillHTML).join('')+'</div></div>';
}

function render(){
  const q=curQ.toLowerCase();
  const list=DATA.filter(d=>{
    if(curCat!=="all" && d.cat!==curCat) return false;
    if(!q) return true;
    if(d.name.toLowerCase().includes(q)) return true;
    return d.skills.some(s=>(s.name+ ' ' + s.info).toLowerCase().includes(q));
  });
  const grid=document.getElementById('grid');
  grid.innerHTML=list.map(cardHTML).join('');
  document.getElementById('count').textContent='显示 '+list.length+' / '+DATA.length+' 名武将';
  document.getElementById('empty').style.display=list.length?'none':'block';
  [...grid.querySelectorAll('.card')].forEach(el=>el.onclick=()=>openModal(el.dataset.key));
}
function openModal(key){
  const d=DATA.find(x=>x.key===key); if(!d)return;
  document.getElementById('mcontent').innerHTML=
    '<div class="chead" style="padding:22px 22px 16px"><div class="mono" style="width:72px;height:72px;font-size:34px;'+monoStyle(d.group)+'">'+esc(d.name[0]||'')+'</div>'
    +'<div class="cmeta"><h3 class="cname" style="font-size:32px">'+esc(d.name)+'</h3>'
    +'<div class="ctags"><span class="tag cat">'+catLabel(d.cat)+'</span>'+grpTag(d.group)+'<span class="tag">'+sexIcon(d.sex)+'</span>'+hearts(d.hp)+'</div></div></div>'
    +'<div class="skills" style="padding:6px 22px 26px">'+d.skills.map(skillHTML).join('')+'</div>';
  document.getElementById('modal').classList.add('open');
}
function closeModal(){ document.getElementById('modal').classList.remove('open'); }

// pills
const pills=document.getElementById('pills');
pills.innerHTML=['<span class="pill active" data-c="all">全部</span>'].concat(CATS.map(c=>'<span class="pill" data-c="'+c.id+'">'+c.label+'</span>')).join('');
[...pills.children].forEach(p=>p.onclick=()=>{[...pills.children].forEach(x=>x.classList.remove('active'));p.classList.add('active');curCat=p.dataset.c;render();});
document.getElementById('q').addEventListener('input',e=>{curQ=e.target.value.trim();render();});
document.getElementById('mclose').onclick=closeModal;
document.getElementById('modal').onclick=e=>{if(e.target.id==='modal')closeModal();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});
render();
</script>
</body>
</html>
